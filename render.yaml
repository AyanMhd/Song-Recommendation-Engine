services:
  - type: web
    name: lyric-vibe-recommender
    runtime: docker
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: MUSICBRAINZ_APP_NAME
        value: LyricVibeRecommender
      - key: MUSICBRAINZ_APP_VERSION
        value: 1.0.0
      - key: MUSICBRAINZ_CONTACT_EMAIL
        sync: false
      - key: SEARCH_RESULT_LIMIT
        value: "10"
      - key: HNSW_EF_SEARCH
        value: "100"
